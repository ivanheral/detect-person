<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrity Detector AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root {
            --p: #6366f1;
            --pg: rgba(99, 102, 241, .4);
            --bg: #030712;
            --cb: #111827;
            --t: #f3f4f6;
            --td: #9ca3af;
            --a: #10b981
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif
        }

        body {
            background: var(--bg);
            color: var(--t);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden
        }

        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--pg) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px)
        }

        #g1 {
            top: -100px;
            right: -100px
        }

        #g2 {
            bottom: -100px;
            left: -100px
        }

        .box {
            width: 90%;
            max-width: 800px;
            padding: 3rem;
            background: rgba(17, 24, 39, .7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .5);
            text-align: center;
            animation: fI .8s ease-out
        }

        @keyframes fI {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: .5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .sub {
            color: var(--td);
            font-size: 1.1rem;
            margin-bottom: 2.5rem
        }

        .uc {
            border: 2px dashed rgba(255, 255, 255, .1);
            border-radius: 24px;
            padding: 3rem;
            cursor: pointer;
            transition: all .3s;
            background: rgba(255, 255, 255, .02)
        }

        .uc:hover {
            border-color: var(--p);
            background: rgba(99, 102, 241, .05);
            transform: scale(1.01)
        }

        .ui {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block
        }

        #fi {
            display: none
        }

        #prev {
            margin-top: 2rem;
            display: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .5)
        }

        #img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto
        }

        #res {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--cb);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, .05);
            display: none;
            text-align: left
        }

        .ri {
            display: flex;
            justify-content: space-between;
            padding: .75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, .05)
        }

        .n {
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase
        }

        .c {
            color: var(--a);
            font-weight: 800
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid #fff;
            border-bottom-color: var(--p);
            border-radius: 50%;
            margin: 20px auto;
            animation: rot 1s linear infinite
        }

        @keyframes rot {
            100% {
                transform: rotate(360deg)
            }
        }

        .st {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: .75rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: rgba(16, 185, 129, .1);
            color: var(--a);
            border: 1px solid var(--a)
        }
    </style>
</head>

<body>
    <div class="glow" id="g1"></div>
    <div class="glow" id="g2"></div>
    <div class="box">
        <div class="st" id="status">Iniciando WebGPU...</div>
        <h1>Celebrity IA Detector</h1>
        <p class="sub">Identificando famosos con Inteligencia Artificial.</p>
        <div class="uc" onclick="document.getElementById('fi').click()">
            <span class="ui">📸</span>
            <p><strong>Haz clic para subir</strong> o arrastra una foto</p>
            <input type="file" id="fi" accept="image/*">
        </div>
        <div id="prev"><img id="img" src="#" alt="Preview"></div>
        <div class="loader" id="loader"></div>
        <div id="res">
            <h3 style="margin-bottom:1rem;font-size:.8rem;text-transform:uppercase;color:var(--td)">Resultados:</h3>
            <div id="rc"></div>
        </div>
    </div>
    <script>
        const cb = "?v=" + Date.now();
        const mURL = 'https://huggingface.co/ivanheral/detect-person/resolve/main/weights/best.onnx' + cb;
        let sess = null, lbls = {};

        async function init() {
            const st = document.getElementById('status');
            st.innerText = "Cargando cerebro...";
            try {
                sess = await ort.InferenceSession.create(mURL, { executionProviders: ['webgpu', 'wasm'] });
                try { const r = await fetch('labels.json' + cb); lbls = await r.json(); } catch (e) { }
                st.innerText = "IA Lista (WebGPU)"; st.style.background = "rgba(16,185,129,0.2)";
            } catch (e) { st.innerText = "Recarga y asegúrate de subir el modelo a HF"; }
        }
        init();

        document.getElementById('fi').addEventListener('change', async (e) => {
            if (!e.target.files[0]) return;
            const i = document.getElementById('img');
            i.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('prev').style.display = 'block';
            document.getElementById('res').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            i.onload = () => run(i);
        });

        async function run(img) {
            if (!sess) return;
            const c = document.createElement('canvas'); c.width = c.height = 224;
            const ctx = c.getContext('2d'), w = img.naturalWidth, h = img.naturalHeight;
            const sz = Math.min(w, h);
            // Recorta el mayor cuadrado posible EXACTAMENTE DEL CENTRO (máxima resolución original sin deformar)
            // y la IA internamente siempre necesita recibirlo matemáticamente escalado a 224x224.
            ctx.drawImage(img, (w - sz) / 2, (h - sz) / 2, sz, sz, 0, 0, 224, 224);

            const d = ctx.getImageData(0, 0, 224, 224).data, inp = new Float32Array(150528);
            for (let i = 0; i < 50176; i++) {
                inp[i] = d[i * 4] / 255; inp[i + 50176] = d[i * 4 + 1] / 255; inp[i + 100352] = d[i * 4 + 2] / 255;
            }
            const out = await sess.run({ [sess.inputNames[0]]: new ort.Tensor('float32', inp, [1, 3, 224, 224]) });

            let scores = Array.from(out[sess.outputNames[0]].data).map((s, idx) => ({ s, idx })).sort((a, b) => b.s - a.s).slice(0, 3);
            const rc = document.getElementById('rc'); rc.innerHTML = '';
            scores.forEach(x => {
                rc.innerHTML += `<div class="ri"><span class="n">${lbls[x.idx] || 'ID:' + x.idx}</span><span class="c">${(x.s * 100).toFixed(1)}%</span></div>`;
            });

            document.getElementById('loader').style.display = 'none';
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>

</html>
