<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Celebrity Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root { --p: #fb923c; --bg: #0c0a09; --t: #fafaf9; --td: #a8a29e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(251,146,60,0.15) 0%, transparent 70%); z-index: -1; filter: blur(80px); }
        .box { width: 90%; max-width: 600px; padding: 2.5rem; background: rgba(28,25,23,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff 0%, var(--p) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { color: var(--td); font-size: 1rem; margin-bottom: 2rem; }
        .uc { border: 2px dashed rgba(255,255,255,0.1); border-radius: 20px; padding: 2.5rem; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02); }
        .uc:hover { border-color: var(--p); background: rgba(251,146,60,0.05); transform: translateY(-2px); }
        #fi { display: none; }
        #prev { margin-top: 1.5rem; display: none; border-radius: 12px; overflow: hidden; }
        #img { max-width: 100%; height: auto; border-radius: 12px; }
        #res { margin-top: 1.5rem; padding: 1.2rem; background: #1c1917; border-radius: 16px; display: none; text-align: left; }
        .ri { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .n { font-weight: 600; font-size: 0.95rem; }
        .c { color: var(--p); font-weight: 800; }
        .loader { display: none; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--p); border-radius: 50%; margin: 1rem auto; animation: r 1s linear infinite; }
        @keyframes r { to { transform: rotate(360deg); } }
        #status { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; margin-bottom: 1rem; border: 1px solid var(--p); color: var(--p); }
    </style>
</head>
<body>
    <div class="glow" style="top:-10%;right:-10%"></div>
    <div class="glow" style="bottom:-10%;left:-10%"></div>
    <div class="box">
        <div id="status">INICIANDO...</div>
        <h1>Celebrity AI</h1>
        <p class="sub">Inferencia local WebGPU de alta fidelidad</p>
        <div class="uc" onclick="document.getElementById('fi').click()">
            <p><strong>Subir foto</strong> del vecino</p>
            <input type="file" id="fi" accept="image/*">
        </div>
        <div id="prev"><img id="img" src="#"></div>
        <div class="loader" id="loader"></div>
        <div id="res"><div id="rc"></div></div>
    </div>
    <script>
        const M_URL = 'https://huggingface.co/ivanheral/detect-person/resolve/main/weights/best.onnx?v=' + Date.now();
        let sess = null, labels = {};

        async function init() {
            const st = document.getElementById('status');
            try {
                sess = await ort.InferenceSession.create(M_URL, { executionProviders: ['webgpu', 'wasm'] });
                const r = await fetch('labels.json?v=' + Date.now()); 
                labels = await r.json();
                st.innerText = "LISTO (WEBGPU)"; st.style.borderColor = "#10b981"; st.style.color = "#10b981";
            } catch (e) { st.innerText = "ERROR DE CARGA"; }
        }
        init();

        document.getElementById('fi').onchange = (e) => {
            const f = e.target.files[0]; if (!f) return;
            const i = document.getElementById('img');
            i.src = URL.createObjectURL(f);
            document.getElementById('prev').style.display = 'block';
            document.getElementById('res').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            i.onload = () => run(i);
        };

        async function run(img) {
            const c = document.createElement('canvas'); c.width = c.height = 224;
            const ctx = c.getContext('2d'), sz = Math.min(img.naturalWidth, img.naturalHeight);
            ctx.drawImage(img, (img.naturalWidth-sz)/2, (img.naturalHeight-sz)/2, sz, sz, 0, 0, 224, 224);
            const d = ctx.getImageData(0, 0, 224, 224).data, inp = new Float32Array(150528);
            for (let j = 0; j < 50176; j++) {
                inp[j] = d[j*4]/255; inp[j+50176] = d[j*4+1]/255; inp[j+100352] = d[j*4+2]/255;
            }
            const out = await sess.run({[sess.inputNames[0]]: new ort.Tensor('float32', inp, [1, 3, 224, 224])});
            const scores = Array.from(out[sess.outputNames[0]].data).map((s, i) => ({s, i})).sort((a,b) => b.s-a.s).slice(0, 3);
            const rc = document.getElementById('rc'); rc.innerHTML = '';
            scores.forEach(x => {
                rc.innerHTML += `<div class="ri"><span class="n">${labels[x.i] || 'ID:'+x.i}</span><span class="c">${(x.s*100).toFixed(1)}%</span></div>`;
            });
            document.getElementById('loader').style.display = 'none';
            document.getElementById('res').style.display = 'block';
        }
    </script>
</body>
</html>
